services:
  backend:
    build: ./backend
    environment:
      SQLITE_PATH: /app/data/course.sqlite
      PORT: 8137
    volumes:
      - backend_data:/app/data
    ports:
      - "8137:8137"
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8137/readyz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend:
    build: ./frontend
    ports:
      - "31371:80"
    volumes:
      # 挂载静态资源，本地改 CSS/HTML 立即生效，无需重建镜像
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/admin.html:/usr/share/nginx/html/admin.html
      - ./frontend/student.html:/usr/share/nginx/html/student.html
      - ./frontend/teacher.html:/usr/share/nginx/html/teacher.html
      - ./frontend/css:/usr/share/nginx/html/css
      - ./frontend/js:/usr/share/nginx/html/js
    depends_on:
      - backend

volumes:
  backend_data:
